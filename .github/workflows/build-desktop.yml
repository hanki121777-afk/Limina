name: Build Desktop App (Mac & Linux)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Mac 빌드 (.dmg) ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Mac (.dmg)
        working-directory: desktop-app
        run: npm run build:mac

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: Limina-Mac-DMG
          path: desktop-app/release/**/*.dmg
          if-no-files-found: error

  # ── Linux 빌드 (.AppImage) ──────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libx11-dev libxkbfile-dev

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Linux (.AppImage)
        working-directory: desktop-app
        run: npm run build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Limina-Linux-AppImage
          path: desktop-app/release/**/*.AppImage
          if-no-files-found: error

  # ── GitHub Release 자동 생성 (태그 푸시 시에만) ─────────────
  release:
    needs: [build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Limina-Mac-DMG
          path: artifacts/mac

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Limina-Linux-AppImage
          path: artifacts/linux

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/linux/*.AppImage
          draft: true
          generate_release_notes: true
